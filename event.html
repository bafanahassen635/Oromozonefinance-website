<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Structure of Oromo Special Zone Finanace</title>
</head>
<body>
  <h1> The Oromo Special Zone Finance Structure Here is It</h1>
  <img src="./images/photo6.jpg" alt="Photo 2"></img>
<button onclick="document.getElementById('demo').innerHTML=Date()">click here to see time</button>
<p id="demo"></p>
    <script>
      let day;
      switch(new Date().getDay()){
        case 0:
          day="Sunday";
        break;
        case 1:
          day="Monday";
        break;
        case 2:
          day="Tuesday";
        break;
        case 3:
          day="Wednesday";
        break;
        case 4:
          day="Thrusday";
        break;
        case 5:
          day="Friday";
        break;
        case 6:
          day="Saturday";
        default:
          day="unknown";
      }
      document.getElementById("demo").innerHTML=day;
      
    </script>
 
</body>
</html>
